<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🌱 成长记录手册</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="成长记录手册">
    <meta name="theme-color" content="#f8f5f0">

                icons: [{ src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxOTIiIGhlaWdodD0iMTkyIiB2aWV3Qm94PSIwIDAgMTkyIDE5MiI+PHJlY3Qgd2lkdGg9IjE5MiIgaGVpZ2h0PSIxOTIiIGZpbGw9IiNiODg2NGUiIHJ4PSIzNiIvPjx0ZXh0IHg9Ijk2IiB5PSIxMjgiIGZvbnQtc2l6ZT0iOTYiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiNmZmYiIGZvbnQtZmFtaWx5PSJzYW5zLXNlcmlmIj7wn5OaPC90ZXh0Pjwvc3ZnPg==", sizes: "192x192", type: "image/svg+xml" }]

    </script>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #f8f5f0; --card-bg: #ffffff; --text: #3d3226; --text-secondary: #8c7b6b;
            --border: #e8e0d5; --accent: #b8864e; --accent-hover: #9a6d3a; --accent-light: #f5ede3;
            --danger: #c0392b; --shadow-sm: 0 1px 3px rgba(61,50,38,0.08);
            --shadow-md: 0 4px 16px rgba(61,50,38,0.12); --shadow-lg: 0 12px 40px rgba(61,50,38,0.2);
            --radius-sm: 8px; --radius: 12px; --radius-lg: 16px; --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
            --font-serif: 'Georgia', 'Noto Serif SC', 'STSong', 'Songti SC', 'SimSun', serif;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --star-color: #f0ad4e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font-sans); background:var(--bg); color:var(--text); min-height:100vh; line-height:1.6; -webkit-font-smoothing:antialiased; }
        .app-container { max-width:680px; margin:0 auto; padding:16px 16px 120px; min-height:100vh; }

        .app-header { text-align:center; padding:28px 0 8px; position:sticky; top:0; z-index:10; background:linear-gradient(180deg, var(--bg) 70%, transparent 100%); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
        .app-header .icon { font-size:42px; display:block; margin-bottom:2px; animation:float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
        .app-header h1 { font-family:var(--font-serif); font-size:26px; font-weight:600; letter-spacing:0.5px; }
        .subtitle { font-size:13px; color:var(--text-secondary); letter-spacing:1px; }
        .auth-info { font-size:12px; color:var(--text-secondary); margin-top:4px; }
        .logout-btn { position:absolute; right:16px; top:16px; background:none; border:1px solid var(--border); padding:4px 12px; border-radius:20px; font-size:12px; cursor:pointer; color:var(--text-secondary); }

        .search-bar { position:sticky; top:130px; z-index:9; background:var(--bg); padding:4px 0 8px; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
        .search-input-wrap { position:relative; display:flex; align-items:center; }
        .search-icon { position:absolute; left:14px; font-size:17px; color:var(--text-secondary); pointer-events:none; }
        .search-input { width:100%; padding:12px 14px 12px 42px; border:1.5px solid var(--border); border-radius:28px; font-size:15px; background:var(--card-bg); color:var(--text); outline:none; box-shadow:var(--shadow-sm); transition:var(--transition); }
        .search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(184,134,78,0.1), var(--shadow-sm); }
        .search-clear { position:absolute; right:12px; width:28px; height:28px; border-radius:50%; background:#e8e0d5; border:none; color:#8c7b6b; font-size:14px; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transform:scale(0.7); transition:var(--transition); }
        .search-clear.visible { opacity:1; pointer-events:auto; transform:scale(1); }
        .search-hint { font-size:12px; color:var(--text-secondary); margin-top:6px; text-align:center; }

        .view-tabs { display:flex; gap:0; margin-top:10px; background:var(--card-bg); border-radius:24px; padding:4px; box-shadow:var(--shadow-sm); }
        .view-tab { flex:1; text-align:center; padding:8px 16px; border-radius:20px; font-size:14px; font-weight:500; cursor:pointer; transition:var(--transition); color:var(--text-secondary); border:none; background:transparent; white-space:nowrap; letter-spacing:0.3px; }
        .view-tab.active { background:var(--accent); color:#fff; font-weight:600; box-shadow:0 2px 8px rgba(184,134,78,0.25); }

        .category-filter { margin-top:8px; display:flex; gap:8px; overflow-x:auto; padding:4px 0 2px; scrollbar-width:thin; -webkit-overflow-scrolling:touch; }
        .filter-tag { flex-shrink:0; padding:6px 16px; border-radius:20px; border:1px solid var(--border); background:#faf7f2; font-size:13px; cursor:pointer; white-space:nowrap; color:var(--text-secondary); letter-spacing:0.3px; user-select:none; transition:var(--transition); }
        .filter-tag.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; box-shadow:0 2px 8px rgba(184,134,78,0.25); }
        .filter-tag .count { margin-left:4px; font-size:11px; opacity:0.8; }

        /* 书架样式 */
        .bookshelf { display:flex; flex-direction:column; gap:24px; margin-top:8px; }
        .shelf-category { }
        .shelf-category-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; padding:0 4px; }
        .shelf-category-header .cat-dot { width:12px; height:12px; border-radius:50%; }
        .shelf-category-header h3 { font-family:var(--font-serif); font-size:18px; font-weight:600; color:var(--text); }
        .shelf-category-header .cat-count { font-size:13px; color:var(--text-secondary); margin-left:auto; }
        .shelf-books { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .book-item { background:var(--card-bg); border-radius:var(--radius); padding:14px 14px 12px; box-shadow:var(--shadow-sm); transition:var(--transition); cursor:pointer; display:flex; flex-direction:column; }
        .book-item:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
        .book-item .book-cover { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
        .book-item .book-emoji { font-size:24px; flex-shrink:0; }
        .book-item .book-meta { flex:1; min-width:0; }
        .book-item .book-title-sm { font-family:var(--font-serif); font-size:14px; font-weight:600; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .book-item .book-author-sm { font-size:11px; color:var(--text-secondary); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .book-item .book-stats-row { display:flex; align-items:center; gap:8px; margin-top:6px; font-size:11px; color:var(--text-secondary); flex-wrap:wrap; }
        .book-item .star-rating-sm { display:inline-flex; gap:1px; font-size:13px; }
        .book-item .star-rating-sm .star { color:#e8e0d5; }
        .book-item .star-rating-sm .star.filled { color:var(--star-color); }
        .book-item .read-count-sm, .book-item .reading-time-sm { display:flex; align-items:center; gap:2px; }

        .notes-list { display:flex; flex-direction:column; gap:12px; margin-top:8px; }
        .note-card { background:var(--card-bg); border-radius:var(--radius); padding:18px 20px; box-shadow:var(--shadow-sm); border:1px solid transparent; transition:var(--transition); animation:fadeInUp 0.35s ease forwards; opacity:0; }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .note-card:hover { box-shadow:var(--shadow-md); border-color:#e8e0d5; }
        .note-card .card-header { display:flex; align-items:flex-start; gap:12px; margin-bottom:6px; }
        .note-card .book-icon { font-size:28px; flex-shrink:0; line-height:1; }
        .note-card .book-info { flex:1; min-width:0; }
        .note-card .book-title { font-family:var(--font-serif); font-size:18px; font-weight:600; letter-spacing:0.3px; word-break:break-word; }
        .note-card .book-author { font-size:13px; color:var(--text-secondary); margin-top:2px; }
        .note-card .card-date { font-size:11px; color:#b8a898; white-space:nowrap; flex-shrink:0; }
        .card-meta-row { display:flex; align-items:center; gap:12px; margin-top:8px; flex-wrap:wrap; }
        .star-rating { display:inline-flex; align-items:center; gap:2px; }
        .star-rating .star { color:#e8e0d5; font-size:16px; }
        .star-rating .star.filled { color:var(--star-color); }
        .read-count { font-size:12px; color:var(--text-secondary); display:flex; align-items:center; gap:4px; }
        .category-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; letter-spacing:0.3px; background:#f0e8db; color:#5c4a35; }
        .card-notes { margin-top:10px; padding-top:10px; border-top:1px dashed #f0e8db; font-size:14px; color:#5c4a35; line-height:1.7; white-space:pre-wrap; word-break:break-word; }
        .card-actions { display:flex; gap:8px; margin-top:12px; justify-content:flex-end; }
        .btn-sm { padding:7px 14px; border-radius:20px; border:1px solid var(--border); background:#faf7f2; cursor:pointer; font-size:12px; color:var(--text-secondary); transition:var(--transition); white-space:nowrap; }
        .btn-sm.edit-btn:hover { background:#fdf6ed; border-color:var(--accent); color:var(--accent); }
        .btn-sm.delete-btn:hover { background:#fef5f5; border-color:#e8c4c4; color:var(--danger); }

        .star-input { display:flex; gap:4px; font-size:28px; cursor:pointer; }
        .star-input .star { color:#e8e0d5; transition:color 0.1s; }
        .star-input .star.active { color:var(--star-color); }

        .empty-state { text-align:center; padding:50px 20px; color:var(--text-secondary); animation:fadeInUp 0.5s ease; }
        .empty-state .empty-icon { font-size:64px; display:block; margin-bottom:16px; opacity:0.7; }
        .empty-state h3 { font-family:var(--font-serif); font-size:18px; margin-bottom:6px; color:var(--text); }

        .stats-view { display:none; flex-direction:column; gap:16px; margin-top:8px; }
        .stats-view.active { display:flex; }
        .stat-cards { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .stat-card { background:var(--card-bg); border-radius:var(--radius); padding:18px 16px; box-shadow:var(--shadow-sm); text-align:center; }
        .stat-card .stat-number { font-family:var(--font-serif); font-size:36px; font-weight:700; color:var(--accent); line-height:1.1; }
        .stat-card .stat-label { font-size:12px; color:var(--text-secondary); margin-top:4px; letter-spacing:0.5px; }
        .stat-card .stat-sub { font-size:11px; color:#b8a898; margin-top:2px; }
        .stat-card.wide { grid-column:1 / -1; }
        .monthly-chart { background:var(--card-bg); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow-sm); }
        .monthly-chart h3 { font-family:var(--font-serif); font-size:16px; margin-bottom:16px; color:var(--text); }
        .chart-bars { display:flex; align-items:flex-end; gap:6px; height:160px; padding:0 4px; }
        .chart-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end; }
        .chart-bar { width:100%; max-width:40px; border-radius:6px 6px 0 0; background:var(--accent); transition:height 0.4s ease; min-height:2px; position:relative; }
        .chart-bar:hover { background:var(--accent-hover); }
        .chart-bar.no-data { background:#e8e0d5; }
        .chart-bar .bar-value { position:absolute; top:-20px; left:50%; transform:translateX(-50%); font-size:11px; font-weight:600; color:var(--text); white-space:nowrap; }
        .chart-label { font-size:10px; color:var(--text-secondary); margin-top:8px; text-align:center; white-space:nowrap; }
        .category-stats { background:var(--card-bg); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow-sm); }
        .category-stats h3 { font-family:var(--font-serif); font-size:16px; margin-bottom:14px; color:var(--text); }
        .cat-stat-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #f5ede3; }
        .cat-stat-row:last-child { border-bottom:none; }
        .cat-stat-color { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
        .cat-stat-name { flex:1; font-size:14px; color:var(--text); }
        .cat-stat-count { font-weight:600; color:var(--accent); font-size:14px; }
        .cat-stat-bar-wrap { flex:2; height:6px; background:#f0e8db; border-radius:3px; overflow:hidden; }
        .cat-stat-bar { height:100%; border-radius:3px; transition:width 0.4s ease; }
        .top-list { background:var(--card-bg); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow-sm); }
        .top-list h3 { font-family:var(--font-serif); font-size:16px; margin-bottom:12px; color:var(--text); }
        .top-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #f5ede3; font-size:14px; }
        .top-item:last-child { border-bottom:none; }
        .top-rank { width:24px; height:24px; border-radius:50%; background:var(--accent); color:#fff; font-weight:600; font-size:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .top-name { flex:1; color:var(--text); }
        .top-count { font-weight:600; color:var(--accent); }

        .reminder-banner { background:#fff8e7; border:1px solid #f0d89d; border-radius:12px; padding:12px 16px; margin-bottom:12px; display:flex; align-items:center; gap:12px; font-size:14px; color:#7c5e10; box-shadow:0 2px 8px rgba(184,134,78,0.08); }
        .reminder-banner .reminder-icon { font-size:24px; flex-shrink:0; }
        .reminder-banner .reminder-text { flex:1; line-height:1.4; }
        .reminder-banner .reminder-btn { padding:8px 18px; border-radius:20px; border:none; background:var(--accent); color:#fff; cursor:pointer; font-weight:600; font-size:13px; white-space:nowrap; flex-shrink:0; }

        .footer-toolbar { display:flex; flex-direction:column; align-items:center; gap:12px; padding:20px 0 30px; font-size:12px; color:var(--text-secondary); }
        .stats-bar span { font-weight:600; color:var(--accent); }
        .tool-buttons { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
        .tool-btn { padding:8px 18px; border-radius:20px; border:1px solid var(--border); background:#faf7f2; cursor:pointer; font-size:13px; color:var(--text-secondary); transition:var(--transition); display:inline-flex; align-items:center; gap:4px; }
        .tool-btn:hover { background:var(--accent-light); border-color:var(--accent); color:var(--accent); }
        .tool-btn.import-btn::before { content:'📥'; font-size:14px; }
        .tool-btn.export-btn::before { content:'📤'; font-size:14px; }

        .fab { position:fixed; bottom:28px; right:28px; width:56px; height:56px; border-radius:50%; background:var(--accent); color:#fff; border:none; cursor:pointer; font-size:28px; box-shadow:var(--shadow-lg); z-index:20; display:flex; align-items:center; justify-content:center; transition:var(--transition); }
        .fab:hover { background:var(--accent-hover); transform:scale(1.06); }
        .fab:active { transform:scale(0.94); }

        .modal-overlay { position:fixed; inset:0; background:rgba(30,22,14,0.55); z-index:30; display:flex; align-items:flex-end; justify-content:center; animation:fadeIn 0.25s ease; backdrop-filter:blur(2px); }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        .modal-overlay.closing { animation:fadeOut 0.2s ease forwards; }
        @keyframes fadeOut { from{opacity:1;} to{opacity:0;} }
        .modal-panel { background:var(--card-bg); border-radius:var(--radius-lg) var(--radius-lg) 0 0; width:100%; max-width:680px; max-height:85vh; overflow-y:auto; padding:24px 20px 32px; box-shadow:0 -8px 40px rgba(30,22,14,0.25); animation:slideUp 0.3s cubic-bezier(0.32,0.72,0,1); }
        @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
        .modal-handle { width:36px; height:4px; background:#d9cebd; border-radius:2px; margin:0 auto 20px; opacity:0.7; }
        .modal-panel h2 { font-family:var(--font-serif); font-size:20px; text-align:center; margin-bottom:20px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:11px; font-weight:600; color:var(--text-secondary); margin-bottom:6px; text-transform:uppercase; }
        .form-group input, .form-group textarea, .form-group select { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:15px; background:#fdfbf7; color:var(--text); outline:none; transition:var(--transition); }
        .form-group textarea { min-height:120px; resize:vertical; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .category-row { display:flex; gap:8px; align-items:flex-end; }
        .category-row .form-group { flex:1; margin-bottom:0; }
        .btn-outline-sm { padding:11px 14px; border-radius:var(--radius-sm); border:1.5px solid var(--border); background:#fff; color:var(--text-secondary); cursor:pointer; font-size:13px; }
        .form-actions { display:flex; gap:10px; margin-top:20px; }
        .btn { flex:1; padding:13px 20px; border-radius:28px; border:none; cursor:pointer; font-size:15px; font-weight:600; transition:var(--transition); }
        .btn-primary { background:var(--accent); color:#fff; box-shadow:0 4px 14px rgba(184,134,78,0.3); }
        .btn-secondary { background:#f5f0e8; color:var(--text-secondary); border:1.5px solid var(--border); }

        .category-manager { margin-top:12px; border-top:1px dashed var(--border); padding-top:16px; }
        .category-list-item { display:flex; align-items:center; justify-content:space-between; padding:8px 4px; border-bottom:1px solid #f5ede3; font-size:14px; }
        .cat-color { width:14px; height:14px; border-radius:50%; margin-right:10px; flex-shrink:0; }
        .cat-name { flex:1; font-weight:500; }
        .cat-actions button { background:none; border:none; font-size:16px; cursor:pointer; margin-left:8px; color:var(--text-secondary); }
        .add-category-row { display:flex; gap:8px; margin-top:12px; }
        .add-category-row input { flex:1; padding:8px 12px; border:1.5px solid var(--border); border-radius:20px; font-size:14px; outline:none; }
        .add-category-row button { padding:8px 16px; border-radius:20px; border:none; background:var(--accent); color:#fff; cursor:pointer; font-weight:500; }

        .auth-container { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
        .auth-box { max-width:400px; width:100%; background:white; border-radius:16px; padding:30px; box-shadow:0 4px 24px rgba(0,0,0,0.1); }
        .auth-box input { width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; font-size:14px; }
        .auth-box button { width:100%; padding:12px; border:none; border-radius:8px; font-size:16px; margin-bottom:8px; cursor:pointer; }
        .btn-auth-primary { background:var(--accent); color:white; }
        .btn-auth-outline { background:white; color:var(--accent); border:1px solid var(--accent); }
        .btn-auth-secondary { background:#eee; color:#333; }
        .auth-error { color:red; text-align:center; margin-top:10px; font-size:14px; }

        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#3d3226; color:#fff; padding:12px 24px; border-radius:28px; font-size:14px; z-index:50; animation:toastIn 0.3s ease, toastOut 0.3s ease 1.8s forwards; pointer-events:none; }
        @keyframes toastIn { from{opacity:0; transform:translateX(-50%) translateY(-20px);} to{opacity:1; transform:translateX(-50%) translateY(0);} }
        @keyframes toastOut { from{opacity:1;} to{opacity:0; transform:translateX(-50%) translateY(-20px);} }
        mark { background:#fef3c7; padding:2px 4px; border-radius:3px; color:#7c5e10; }
        @media (max-width:400px) { .shelf-books { grid-template-columns:1fr; } .stat-cards { grid-template-columns:1fr 1fr; } .chart-bars { gap:3px; } .chart-bar { max-width:28px; } }
    </style>
</head>
<body>
    <div id="authContainer" class="auth-container" style="display:none;">
        <div class="auth-box">
            <h2 style="text-align:center; margin-bottom:20px;">🔐 登录成长手册</h2>
            <input type="email" id="authEmail" placeholder="电子邮箱">
            <input type="password" id="authPassword" placeholder="密码（至少6位）">
            <button id="loginBtn" class="btn-auth-primary">登 录</button>
            <button id="registerBtn" class="btn-auth-outline">注册新账号</button>
            <p id="authError" class="auth-error"></p>
            <button id="anonymousBtn" class="btn-auth-secondary" style="margin-top:10px;">免注册试用（数据仅本地）</button>
        </div>
    </div>

    <div id="appContainer" class="app-container" style="display:none;">
        <header class="app-header">
            <span class="icon">🌱</span>
            <h1>成长记录手册</h1>
            <p class="subtitle" id="userEmailDisplay">未登录</p>
            <button class="logout-btn" id="logoutBtn">退出</button>
        </header>
        <div class="search-bar" id="searchBarArea">
            <div class="search-input-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索书名、作者或感想..." autocomplete="off">
                <button class="search-clear" id="searchClear">✕</button>
            </div>
            <div class="category-filter" id="categoryFilter"></div>
            <div class="view-tabs" id="viewTabs">
                <button class="view-tab active" data-view="notes">📚 书架</button>
                <button class="view-tab" data-view="stats">📊 阅读统计</button>
            </div>
            <p class="search-hint">共 <span id="totalCount">0</span> 条笔记</p>
        </div>
        <div class="reminder-banner" id="reminderBanner" style="display:none;">
            <span class="reminder-icon">⚠️</span>
            <span class="reminder-text">📅 本月尚未备份读书笔记，建议立即导出备份以防数据丢失。</span>
            <button class="reminder-btn" id="reminderExportBtn">立即备份</button>
        </div>

        <div class="bookshelf" id="bookshelf"></div>
        <div class="notes-list" id="notesList" style="display:none;"></div>

        <div class="stats-view" id="statsView">
            <div class="stat-cards" id="statCards"></div>
            <div class="monthly-chart" id="monthlyChart"><h3>📈 近12个月阅读趋势</h3><div class="chart-bars" id="chartBars"></div></div>
            <div class="category-stats" id="categoryStats"><h3>🏷️ 分类分布</h3><div id="catStatList"></div></div>
            <div class="top-list" id="topBooksContainer"><h3>📚 阅读次数最多的书籍</h3><div id="topBooksList"></div></div>
            <div class="top-list" id="topAuthorsContainer"><h3>✒️ 阅读次数最多的作者</h3><div id="topAuthorsList"></div></div>
            <div class="monthly-book-list" id="monthlyBookList"><h3>📅 本月阅读书目</h3><div id="monthlyBooksContainer"></div></div>
        </div>

        <div class="footer-toolbar">
            <div class="stats-bar">📖 已记录 <span id="statsCount">0</span> 本书的笔记</div>
            <div class="tool-buttons">
                <button class="tool-btn export-btn" id="exportBtn">导出备份</button>
                <button class="tool-btn import-btn" id="importBtn">导入备份</button>
            </div>
            <input type="file" id="importFileInput" accept=".json" style="display:none;">
        </div>
        <button class="fab" id="fabBtn">＋</button>
    </div>

    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal-panel">
            <div class="modal-handle"></div>
            <h2 id="modalTitle">✍️ 添加笔记</h2>
            <form id="noteForm" autocomplete="off">
                <input type="hidden" id="noteId">
                <div class="form-row">
                    <div class="form-group"><label>📖 书名 *</label><input type="text" id="bookTitle" required></div>
                    <div class="form-group"><label>✒️ 作者</label><input type="text" id="bookAuthor"></div>
                </div>
                <div class="form-group"><label>📅 阅读日期</label><input type="date" id="bookDate"></div>
                <div class="category-row">
                    <div class="form-group"><label>🏷️ 分类</label><select id="bookCategory"></select></div>
                    <button type="button" class="btn-outline-sm" id="manageCategoryBtn">⚙️ 管理分类</button>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>⏱️ 阅读时长 (小时)</label>
                        <input type="number" id="readingDuration" placeholder="例如 2.5" step="0.5" min="0" max="1000">
                    </div>
                    <div class="form-group">
                        <label>⭐ 打分 (1-5)</label>
                        <div class="star-input" id="starInput">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                        </div>
                    </div>
                </div>
                <div class="form-group"><label>💬 感想 *</label><textarea id="bookNotes" required></textarea></div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">💾 保存笔记</button>
                </div>
            </form>
            <div class="category-manager" id="categoryManager" style="display:none;">
                <h3 style="font-size:16px; margin-bottom:12px;">📂 管理分类</h3>
                <div id="categoryListContainer"></div>
                <div class="add-category-row">
                    <input type="text" id="newCategoryName" placeholder="新分类名称" maxlength="20">
                    <button id="addCategoryBtn">添加</button>
                </div>
                <button class="btn btn-secondary" style="margin-top:12px; width:100%;" id="closeCategoryManager">完成</button>
            </div>
        </div>
    </div>
    <div id="toastContainer"></div>

    <script>
        (() => {
            const firebaseConfig = {
                apiKey: "AIzaSyB2L_ud-YHeOIMsQT_cIQ8eMSfA0O5cWOA",
                authDomain: "readingnotes-4c3cd.firebaseapp.com",
                projectId: "readingnotes-4c3cd",
                storageBucket: "readingnotes-4c3cd.firebasestorage.app",
                messagingSenderId: "1037481932331",
                appId: "1:1037481932331:web:3d2b2c7e289e45e1365c6e",
                measurementId: "G-BWNNZBZQSE"
            };
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();
            db.enablePersistence().catch(() => {});

            let currentUser = null, notes = [], categories = [], searchTerm = '', activeCat = null, editingId = null;
            let currentView = 'notes', unsubscribeNotes = null, unsubscribeCats = null, currentRating = 0;

            const today = () => new Date().toISOString().slice(0,10);
            const fmtDate = d => { if(!d) return ''; const dt = new Date(d+'T00:00:00'); const now = new Date(); const diff = Math.floor((now-dt)/864e5); if(diff===0)return'今天'; if(diff===1)return'昨天'; if(diff===2)return'前天'; if(diff<7)return diff+'天前'; if(diff<30)return Math.floor(diff/7)+'周前'; if(diff<365)return Math.floor(diff/30)+'个月前'; return d; };
            const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
            const hl = (t, q) => { if(!q) return esc(t); const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'); return esc(t).replace(re, '<mark>$1</mark>'); };
            const toast = m => { const t = document.createElement('div'); t.className='toast'; t.textContent=m; document.getElementById('toastContainer').appendChild(t); setTimeout(()=>t.remove(),2200); };
            const curMonth = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); };
            const getMonthLabel = (ym) => { const [y,m] = ym.split('-'); return `${parseInt(m)}月`; };

            const $ = id => document.getElementById(id);
            const els = {
                authContainer: $('authContainer'), appContainer: $('appContainer'),
                authEmail: $('authEmail'), authPassword: $('authPassword'),
                loginBtn: $('loginBtn'), registerBtn: $('registerBtn'), authError: $('authError'),
                anonymousBtn: $('anonymousBtn'), userEmailDisplay: $('userEmailDisplay'), logoutBtn: $('logoutBtn'),
                bookshelf: $('bookshelf'), notesList: $('notesList'), statsView: $('statsView'),
                viewTabs: $('viewTabs'), searchInput: $('searchInput'), searchClear: $('searchClear'),
                totalCount: $('totalCount'), statsCount: $('statsCount'),
                categoryFilter: $('categoryFilter'), searchBarArea: $('searchBarArea'),
                reminderBanner: $('reminderBanner'), reminderExportBtn: $('reminderExportBtn'),
                exportBtn: $('exportBtn'), importBtn: $('importBtn'), importFileInput: $('importFileInput'),
                fabBtn: $('fabBtn'), modalOverlay: $('modalOverlay'), modalTitle: $('modalTitle'),
                noteForm: $('noteForm'), noteId: $('noteId'), bookTitle: $('bookTitle'),
                bookAuthor: $('bookAuthor'), bookDate: $('bookDate'), bookCategory: $('bookCategory'),
                readingDuration: $('readingDuration'), starInput: $('starInput'),
                bookNotes: $('bookNotes'), submitBtn: $('submitBtn'),
                categoryManager: $('categoryManager'), categoryListContainer: $('categoryListContainer'),
                newCategoryName: $('newCategoryName'), addCategoryBtn: $('addCategoryBtn'),
                closeCategoryManagerBtn: $('closeCategoryManager'), cancelBtn: $('cancelBtn'),
                manageCategoryBtn: $('manageCategoryBtn'),
                statCards: $('statCards'), chartBars: $('chartBars'), catStatList: $('catStatList'),
                monthlyBooksContainer: $('monthlyBooksContainer'),
                topBooksList: $('topBooksList'), topAuthorsList: $('topAuthorsList')
            };

            function initStarInput() {
                els.starInput.querySelectorAll('.star').forEach(star => {
                    star.addEventListener('click', () => setStarRating(parseInt(star.dataset.value)));
                });
            }
            function setStarRating(val) {
                currentRating = val;
                els.starInput.querySelectorAll('.star').forEach(s => s.classList.toggle('active', parseInt(s.dataset.value) <= val));
            }

            function showAuth() { els.authContainer.style.display = 'flex'; els.appContainer.style.display = 'none'; }
            function showApp() {
                els.authContainer.style.display = 'none'; els.appContainer.style.display = 'block';
                if (currentUser) els.userEmailDisplay.textContent = currentUser.isAnonymous ? '📁 本地模式（未同步）' : `📧 ${currentUser.email}`;
            }
            els.loginBtn.addEventListener('click', async () => {
                const email = els.authEmail.value.trim(), pass = els.authPassword.value;
                if (!email || !pass) { els.authError.textContent = '请填写邮箱和密码'; return; }
                try { await auth.signInWithEmailAndPassword(email, pass); els.authError.textContent = ''; }
                catch (e) { els.authError.textContent = e.message; }
            });
            els.registerBtn.addEventListener('click', async () => {
                const email = els.authEmail.value.trim(), pass = els.authPassword.value;
                if (!email || !pass) { els.authError.textContent = '请填写邮箱和密码'; return; }
                if (pass.length < 6) { els.authError.textContent = '密码至少6位'; return; }
                try { await auth.createUserWithEmailAndPassword(email, pass); els.authError.textContent = ''; }
                catch (e) { els.authError.textContent = e.message; }
            });
            els.anonymousBtn.addEventListener('click', () => { currentUser = { uid: 'local_anonymous', isAnonymous: true }; showApp(); startLocalMode(); });
            els.logoutBtn.addEventListener('click', () => { if (currentUser && currentUser.isAnonymous) { currentUser = null; stopSync(); showAuth(); } else { auth.signOut(); } });
            auth.onAuthStateChanged(user => {
                if (user) { currentUser = user; showApp(); startCloudSync(); }
                else { if (currentUser && currentUser.isAnonymous) {} else { currentUser = null; stopSync(); showAuth(); } }
            });

            function startCloudSync() {
                if (!currentUser || currentUser.isAnonymous) return;
                stopSync();
                const uid = currentUser.uid;
                const catsRef = db.collection('users').doc(uid).collection('categories');
                unsubscribeCats = catsRef.onSnapshot(snapshot => {
                    categories = []; snapshot.forEach(doc => categories.push({ id: doc.id, ...doc.data() }));
                    if (categories.length === 0) {
                        const defaults = [
                            { name: '未分类', color: '#b8a898', isDefault: true }, { name: '文学', color: '#c47e5a', isDefault: true },
                            { name: '历史', color: '#8b5e3c', isDefault: true }, { name: '科技', color: '#5d7b6f', isDefault: true },
                            { name: '哲学', color: '#7b6b8a', isDefault: true }, { name: '心理', color: '#b87a6b', isDefault: true },
                            { name: '商业', color: '#6d8a7d', isDefault: true }, { name: '生活', color: '#c49a6c', isDefault: true }
                        ];
                        const batch = db.batch();
                        defaults.forEach(c => { const ref = catsRef.doc(c.name === '未分类' ? 'uncategorized' : c.name.toLowerCase()); batch.set(ref, c); });
                        batch.commit();
                    }
                    renderAll();
                });
                const notesRef = db.collection('users').doc(uid).collection('notes');
                unsubscribeNotes = notesRef.orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                    notes = []; snapshot.forEach(doc => notes.push({ id: doc.id, ...doc.data() }));
                    renderAll();
                });
            }
            function stopSync() { if (unsubscribeNotes) { unsubscribeNotes(); unsubscribeNotes = null; } if (unsubscribeCats) { unsubscribeCats(); unsubscribeCats = null; } }
            function startLocalMode() {
                stopSync();
                notes = JSON.parse(localStorage.getItem('local_notes') || '[]');
                categories = JSON.parse(localStorage.getItem('local_categories') || '[]');
                if (categories.length === 0) {
                    categories = [
                        { id:'uncategorized',name:'未分类',color:'#b8a898',isDefault:true }, { id:'literature',name:'文学',color:'#c47e5a',isDefault:true },
                        { id:'history',name:'历史',color:'#8b5e3c',isDefault:true }, { id:'tech',name:'科技',color:'#5d7b6f',isDefault:true },
                        { id:'philosophy',name:'哲学',color:'#7b6b8a',isDefault:true }, { id:'psychology',name:'心理',color:'#b87a6b',isDefault:true },
                        { id:'business',name:'商业',color:'#6d8a7d',isDefault:true }, { id:'life',name:'生活',color:'#c49a6c',isDefault:true }
                    ];
                }
                renderAll();
            }
            function saveLocal() { localStorage.setItem('local_notes', JSON.stringify(notes)); localStorage.setItem('local_categories', JSON.stringify(categories)); }

            els.viewTabs.querySelectorAll('.view-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentView = tab.dataset.view;
                    els.viewTabs.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    updateViewVisibility();
                });
            });
            function updateViewVisibility() {
                if (currentView === 'notes') {
                    els.bookshelf.style.display = ''; els.notesList.style.display = 'none'; els.statsView.classList.remove('active');
                    renderBookshelfOrSearch();
                } else {
                    els.bookshelf.style.display = 'none'; els.notesList.style.display = 'none'; els.statsView.classList.add('active');
                    renderStats();
                }
            }

            function renderBookshelfOrSearch() {
                if (searchTerm.trim() || activeCat) {
                    els.bookshelf.style.display = 'none';
                    els.notesList.style.display = '';
                    renderNotesList();
                } else {
                    els.bookshelf.style.display = '';
                    els.notesList.style.display = 'none';
                    renderBookshelf();
                }
            }

            function renderBookshelf() {
                const grouped = {};
                categories.forEach(c => grouped[c.id] = []);
                notes.forEach(n => {
                    const catId = n.categoryId || 'uncategorized';
                    if (!grouped[catId]) grouped[catId] = [];
                    grouped[catId].push(n);
                });
                let html = '';
                categories.forEach(c => {
                    const list = grouped[c.id] || [];
                    if (list.length === 0 && c.id !== 'uncategorized') return;
                    const emojis = ['📖','📚','📕','📗','📘','📙','📓','📔','📒','🪶'];
                    html += `<div class="shelf-category" id="cat-${c.id}">
                        <div class="shelf-category-header">
                            <span class="cat-dot" style="background:${c.color};"></span>
                            <h3>${esc(c.name)}</h3>
                            <span class="cat-count">${list.length}本</span>
                        </div>
                        <div class="shelf-books">`;
                    list.forEach((n, i) => {
                        const rating = n.rating || 0;
                        const readCount = n.readCount || 1;
                        const readTime = n.readingDuration ? `${n.readingDuration}h` : '';
                        let starsHtml = '';
                        for (let s=1; s<=5; s++) starsHtml += `<span class="star${s <= rating ? ' filled' : ''}">★</span>`;
                        html += `<div class="book-item" data-id="${n.id}">
                            <div class="book-cover">
                                <span class="book-emoji">${emojis[i%10]}</span>
                                <div class="book-meta">
                                    <div class="book-title-sm">${esc(n.title)}</div>
                                    ${n.author ? `<div class="book-author-sm">${esc(n.author)}</div>` : ''}
                                </div>
                            </div>
                            <div class="book-stats-row">
                                <span class="star-rating-sm">${starsHtml}</span>
                                <span class="read-count-sm">📖 ${readCount}次</span>
                                ${readTime ? `<span class="reading-time-sm">⏱️ ${readTime}</span>` : ''}
                            </div>
                        </div>`;
                    });
                    html += `</div></div>`;
                });
                els.bookshelf.innerHTML = html || '<div class="empty-state"><span class="empty-icon">📝</span><h3>还没有记录</h3><p>点击右下角 ＋ 添加第一本书吧</p></div>';
                // 绑定点击事件
                els.bookshelf.querySelectorAll('.book-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const id = this.dataset.id;
                        if (id) openEdit(id);
                    });
                });
            }

            function renderNotesList() {
                let filtered = [...notes];
                if (searchTerm) filtered = filtered.filter(n => n.title.toLowerCase().includes(searchTerm) || n.author.toLowerCase().includes(searchTerm) || n.notes.toLowerCase().includes(searchTerm));
                if (activeCat) filtered = filtered.filter(n => n.categoryId === activeCat);
                filtered.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
                if (filtered.length === 0) {
                    els.notesList.innerHTML = '<div class="empty-state"><span class="empty-icon">🔍</span><h3>没有匹配的记录</h3></div>';
                    return;
                }
                els.notesList.innerHTML = filtered.map((n,i) => {
                    const cat = categories.find(c => c.id === n.categoryId) || categories.find(c => c.id === 'uncategorized');
                    const catName = cat ? cat.name : '未分类'; const catColor = cat ? cat.color : '#b8a898';
                    const rating = n.rating || 0; const readCount = n.readCount || 1;
                    const readTime = n.readingDuration ? `${n.readingDuration}h` : '';
                    let starsHtml = '';
                    for (let s=1; s<=5; s++) starsHtml += `<span class="star${s <= rating ? ' filled' : ''}">★</span>`;
                    return `<div class="note-card">
                        <div class="card-header">
                            <span class="book-icon">📖</span>
                            <div class="book-info">
                                <div class="book-title">${hl(n.title,searchTerm)}</div>
                                ${n.author?`<div class="book-author">${hl(n.author,searchTerm)}</div>`:''}
                                <div class="card-meta-row">
                                    <span class="category-badge" style="background:${catColor}20;color:${catColor};border:1px solid ${catColor}40;">${esc(catName)}</span>
                                    <span class="star-rating">${starsHtml}</span>
                                    <span class="read-count">📖 ${readCount}次</span>
                                    ${readTime ? `<span>⏱️ ${readTime}</span>` : ''}
                                </div>
                            </div>
                            <span class="card-date">${fmtDate(n.date)}</span>
                        </div>
                        <div class="card-notes">${hl(n.notes,searchTerm)}</div>
                        <div class="card-actions">
                            <button class="btn-sm edit-btn" data-id="${n.id}">✏️</button>
                            <button class="btn-sm delete-btn" data-id="${n.id}">🗑</button>
                        </div>
                    </div>`;
                }).join('');
                els.notesList.querySelectorAll('.edit-btn').forEach(b => b.onclick = () => openEdit(b.dataset.id));
                els.notesList.querySelectorAll('.delete-btn').forEach(b => b.onclick = () => delNote(b.dataset.id));
            }

            // 统计、导出、CRUD等函数保持不变（此处省略，与上一版完全相同）
            // 为节省篇幅，其余函数请直接沿用上一版完整代码，此处仅展示修复后的renderBookshelf()
            // 实际使用时，请将上一版完整代码中的renderBookshelf函数替换为上述修复版即可。
            // ...（后续函数与上一版完全一致，此处从略）
        })();
    </script>
</body>
</html>
